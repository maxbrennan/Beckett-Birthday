<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; media-src 'self'">
  <title>Beckett Birthday</title>
  <style>
    body { margin: 0; background: #000; color: #eee; font-family: monospace; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="elm.js"></script>
  <script>
    const app = Elm.Main.init({ node: document.getElementById('app') })
    window.electronAPI.onDevices((data) => {
      app.ports.receiveDevices.send(data)
    })

    const audio = new Audio('assets/jeopardy-theme.mp3')
    audio.loop = true
    audio.play()
  </script>
</body>
</html>
